name: pangolin
services:
  pangolin:
    image: fosrl/pangolin:1.1.0
    container_name: pangolin
    restart: unless-stopped
    volumes:
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/"]
      interval: "3s"
      timeout: "3s"
      retries: 5
    networks:
      - pangolin_network

  traefik:
    image: traefik:v3.3.3
    container_name: traefik
    restart: unless-stopped
    ports:
      - 443:443
      - 80:80
      - 8080:8080
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    environment:
      - CLOUDFLARE_DNS_API_TOKEN=${CLOUDFLARE_DNS_API_TOKEN:-your_dns_api_token_here}
    volumes:
      - ./config/traefik:/etc/traefik:ro
      - ./config/letsencrypt:/letsencrypt
      - ./config/traefik/logs:/var/log/traefik
    networks:
      - pangolin_network

  cloudflared:
    image: cloudflare/cloudflared:2025.4.0
    container_name: cloudflared
    restart: unless-stopped
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token=${CLOUDFLARED_TOKEN}
    networks:
      - pangolin_network
    depends_on:
      - traefik

  traefik-cloudflare-tunnel:
    image: "hhftechnology/pangolin-cloudflare-tunnel:latest"
    container_name: pangolin-cloudflare-tunnel
    restart: unless-stopped
    environment:
      # Required Configuration
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}
      - CLOUDFLARE_TUNNEL_ID=${CLOUDFLARE_TUNNEL_ID}
      - TRAEFIK_SERVICE_ENDPOINT=https://traefik:443
      - TRAEFIK_API_ENDPOINT=http://traefik:8080
      - TRAEFIK_ENTRYPOINTS=web,websecure

      # Zone Configuration - Use either single or multi-zone
      # Single Zone (Legacy)
      - CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID:-}
      - DOMAIN_NAME=${DOMAIN_NAME:-}
      # Multi-Zone (NEW) - Uncomment if using multiple zones
      # - CLOUDFLARE_ZONE_IDS=${CLOUDFLARE_ZONE_IDS:-}
      # - DOMAIN_NAMES=${DOMAIN_NAMES:-}

      # Optional Configuration (NEW Features)
      # Resource Exclusion - Ignore Jellyfin and media services
      - IGNORE_PATTERNS=${IGNORE_PATTERNS:-}
      # DNS Cleanup - Auto-remove deleted resources
      - ENABLE_DNS_CLEANUP=${ENABLE_DNS_CLEANUP:-true}

      # Optional Configuration (Existing)
      - POLL_INTERVAL=${POLL_INTERVAL:-10s}
      - SKIP_TLS_ROUTES=${SKIP_TLS_ROUTES:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - pangolin_network
    depends_on:
      - traefik
      - cloudflared

networks:
  pangolin_network:
    driver: bridge
    name: pangolin_network
